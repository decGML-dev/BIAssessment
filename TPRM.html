<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DORA ICT Third-Party Risk Management</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F6F9;
  --sidebar-bg: #0F1A2E;
  --sidebar-hover: #1A2A44;
  --sidebar-active: #243B5C;
  --card: #FFFFFF;
  --border: #DDE2EA;
  --text: #1A1F2E;
  --text-secondary: #5A6478;
  --text-muted: #8A94A6;
  --primary: #1B6EF3;
  --primary-hover: #1558C9;
  --primary-light: #E8F0FE;
  --accent: #0EA574;
  --accent-light: #E6F7F1;
  --danger: #DC3545;
  --danger-light: #FDEAEC;
  --warning: #E8A317;
  --warning-light: #FFF8E6;
  --info: #0DCAF0;
  --info-light: #E6FAFE;
  --high: #DC3545;
  --medium: #E8A317;
  --low: #0EA574;
  --critical: #8B0000;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
  --transition: 0.2s ease;
  --font: 'IBM Plex Sans', -apple-system, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:var(--font); background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; }

/* Layout */
.app { display:flex; height:100vh; overflow:hidden; }
.sidebar { width:250px; min-width:250px; background:var(--sidebar-bg); display:flex; flex-direction:column; z-index:100; }
.sidebar-brand { padding:20px 22px; border-bottom:1px solid rgba(255,255,255,0.06); }
.sidebar-brand h2 { color:#fff; font-size:15px; font-weight:700; letter-spacing:-0.3px; }
.sidebar-brand span { color:var(--primary); }
.sidebar-brand p { color:rgba(255,255,255,0.4); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }
.sidebar-nav { flex:1; padding:12px 10px; overflow-y:auto; }
.nav-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:var(--radius); color:rgba(255,255,255,0.6); cursor:pointer; transition:var(--transition); font-size:13px; font-weight:500; margin-bottom:2px; }
.nav-item:hover { background:var(--sidebar-hover); color:rgba(255,255,255,0.9); }
.nav-item.active { background:var(--sidebar-active); color:#fff; }
.nav-item svg { width:18px; height:18px; flex-shrink:0; }
.nav-badge { margin-left:auto; background:var(--danger); color:#fff; font-size:10px; font-weight:700; padding:1px 7px; border-radius:10px; }
.sidebar-footer { padding:14px 16px; border-top:1px solid rgba(255,255,255,0.06); }
.sidebar-footer p { color:rgba(255,255,255,0.3); font-size:10px; text-align:center; }

.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { display:flex; align-items:center; gap:16px; padding:14px 28px; background:var(--card); border-bottom:1px solid var(--border); min-height:56px; }
.search-box { flex:1; max-width:420px; position:relative; }
.search-box input { width:100%; padding:8px 12px 8px 36px; border:1px solid var(--border); border-radius:var(--radius); font-size:13px; font-family:var(--font); outline:none; transition:var(--transition); background:var(--bg); }
.search-box input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(27,110,243,0.1); }
.search-box svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--text-muted); }
.topbar-actions { display:flex; align-items:center; gap:10px; margin-left:auto; }

.content { flex:1; overflow-y:auto; padding:24px 28px; }

/* Cards */
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px 24px; margin-bottom:16px; box-shadow:var(--shadow); }
.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.card-title { font-size:16px; font-weight:700; letter-spacing:-0.3px; }
.card-subtitle { font-size:12px; color:var(--text-secondary); margin-top:2px; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius); font-family:var(--font); font-size:13px; font-weight:600; border:none; cursor:pointer; transition:var(--transition); white-space:nowrap; }
.btn svg { width:15px; height:15px; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-hover); }
.btn-success { background:var(--accent); color:#fff; }
.btn-success:hover { background:#0C8F65; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { background:#B82D3B; }
.btn-warning { background:var(--warning); color:#fff; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-outline:hover { background:var(--bg); border-color:var(--text-muted); }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-xs { padding:3px 8px; font-size:11px; }
.btn-icon { padding:6px; border-radius:6px; background:transparent; border:1px solid var(--border); cursor:pointer; color:var(--text-secondary); transition:var(--transition); }
.btn-icon:hover { background:var(--bg); color:var(--text); }
.btn-group { display:flex; gap:6px; }

/* Badges */
.badge { display:inline-flex; align-items:center; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:600; letter-spacing:0.2px; }
.badge-low { background:#E6F7F1; color:#0A7B56; }
.badge-medium, .badge-med { background:#FFF3D6; color:#9A6C00; }
.badge-high { background:#FDEAEC; color:#B82D3B; }
.badge-critical { background:#5C0011; color:#FFB3B3; }
.badge-info { background:var(--info-light); color:#0AA8C9; }
.badge-primary { background:var(--primary-light); color:var(--primary); }
.badge-success { background:var(--accent-light); color:var(--accent); }
.badge-warning { background:var(--warning-light); color:#9A6C00; }
.badge-danger { background:var(--danger-light); color:var(--danger); }
.badge-neutral { background:#EBEEF2; color:var(--text-secondary); }

/* Tables */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); border-bottom:2px solid var(--border); background:var(--bg); position:sticky; top:0; }
td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
tr:hover td { background:rgba(27,110,243,0.02); }
th.sortable { cursor:pointer; user-select:none; }
th.sortable:hover { color:var(--text); }

/* Forms */
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:4px; }
.form-label .required { color:var(--danger); }
.form-control { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:var(--radius); font-family:var(--font); font-size:13px; outline:none; transition:var(--transition); background:#fff; }
.form-control:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(27,110,243,0.1); }
.form-control.error { border-color:var(--danger); }
.form-error { font-size:11px; color:var(--danger); margin-top:2px; }
select.form-control { cursor:pointer; }
textarea.form-control { resize:vertical; min-height:70px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.form-check { display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer; }
.form-check input { cursor:pointer; }

/* Multi-select */
.multi-select { position:relative; }
.multi-select-display { padding:8px 12px; border:1px solid var(--border); border-radius:var(--radius); font-size:13px; cursor:pointer; min-height:36px; display:flex; flex-wrap:wrap; gap:4px; align-items:center; background:#fff; }
.multi-select-display:focus-within { border-color:var(--primary); box-shadow:0 0 0 3px rgba(27,110,243,0.1); }
.ms-tag { display:inline-flex; align-items:center; gap:4px; padding:1px 8px; background:var(--primary-light); color:var(--primary); border-radius:4px; font-size:11px; font-weight:500; }
.ms-tag button { background:none; border:none; cursor:pointer; color:var(--primary); font-size:14px; line-height:1; padding:0; }
.multi-select-dropdown { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-md); z-index:50; max-height:200px; overflow-y:auto; display:none; }
.multi-select-dropdown.open { display:block; }
.ms-option { padding:6px 12px; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:8px; }
.ms-option:hover { background:var(--bg); }
.ms-option.selected { background:var(--primary-light); }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:flex-start; justify-content:center; padding-top:40px; opacity:0; pointer-events:none; transition:opacity 0.2s; overflow-y:auto; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--card); border-radius:var(--radius-lg); width:95%; max-width:680px; box-shadow:var(--shadow-lg); transform:translateY(-10px); transition:transform 0.2s; margin-bottom:40px; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:18px 24px; border-bottom:1px solid var(--border); }
.modal-title { font-size:16px; font-weight:700; }
.modal-close { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:22px; padding:4px; line-height:1; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:20px 24px; max-height:calc(100vh - 200px); overflow-y:auto; }
.modal-footer { display:flex; justify-content:flex-end; gap:8px; padding:14px 24px; border-top:1px solid var(--border); }

/* Toast */
.toast-container { position:fixed; top:20px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:8px; }
.toast { padding:12px 18px; border-radius:var(--radius); font-size:13px; font-weight:500; color:#fff; box-shadow:var(--shadow-md); animation:toastIn 0.3s ease; min-width:280px; display:flex; align-items:center; gap:10px; }
.toast-success { background:#0EA574; }
.toast-error { background:#DC3545; }
.toast-warning { background:#E8A317; }
.toast-info { background:var(--primary); }
@keyframes toastIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }

/* KPI Grid */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:14px; margin-bottom:20px; }
.kpi-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 20px; box-shadow:var(--shadow); }
.kpi-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); margin-bottom:6px; }
.kpi-value { font-size:28px; font-weight:700; letter-spacing:-1px; line-height:1.1; }
.kpi-sub { font-size:11px; color:var(--text-secondary); margin-top:4px; }
.kpi-card.kpi-accent { border-left:3px solid var(--primary); }
.kpi-card.kpi-danger { border-left:3px solid var(--danger); }
.kpi-card.kpi-warning { border-left:3px solid var(--warning); }
.kpi-card.kpi-success { border-left:3px solid var(--accent); }

/* Charts */
.chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.chart-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; box-shadow:var(--shadow); }
.chart-card h3 { font-size:13px; font-weight:700; margin-bottom:12px; }
.chart-container { position:relative; height:220px; }

/* Tabs */
.tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:18px; }
.tab { padding:10px 18px; font-size:13px; font-weight:600; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:var(--transition); }
.tab:hover { color:var(--text); }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }

/* Filter bar */
.filter-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
.filter-bar select, .filter-bar input { padding:6px 10px; border:1px solid var(--border); border-radius:var(--radius); font-size:12px; font-family:var(--font); background:#fff; }

/* Empty state */
.empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty-state svg { width:48px; height:48px; margin-bottom:12px; opacity:0.4; }
.empty-state h3 { font-size:16px; color:var(--text-secondary); margin-bottom:6px; }
.empty-state p { font-size:13px; margin-bottom:16px; }

/* Provider detail */
.detail-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; }
.detail-title { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.detail-meta { display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
.detail-back { font-size:13px; color:var(--primary); cursor:pointer; margin-bottom:10px; display:inline-flex; align-items:center; gap:4px; }
.detail-back:hover { text-decoration:underline; }

/* Progress bar */
.progress-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; transition:width 0.4s ease; }
.progress-fill.green { background:var(--accent); }
.progress-fill.yellow { background:var(--warning); }
.progress-fill.red { background:var(--danger); }

/* Control checklist */
.control-domain { margin-bottom:18px; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.control-domain-header { padding:12px 16px; background:var(--bg); display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-weight:600; font-size:13px; }
.control-domain-header:hover { background:#EBEEF2; }
.control-item { padding:10px 16px; border-top:1px solid var(--border); display:flex; align-items:flex-start; gap:12px; font-size:13px; }
.control-item-text { flex:1; }
.control-status-select { padding:4px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px; font-family:var(--font); font-weight:600; cursor:pointer; }
.control-status-select.pass { background:#E6F7F1; color:#0A7B56; border-color:#0EA574; }
.control-status-select.fail { background:#FDEAEC; color:#B82D3B; border-color:#DC3545; }
.control-status-select.in-progress { background:#FFF3D6; color:#9A6C00; border-color:#E8A317; }
.control-status-select.na { background:#EBEEF2; color:var(--text-muted); }
.evidence-list { margin-top:6px; }
.evidence-item { font-size:11px; color:var(--text-secondary); padding:2px 0; display:flex; align-items:center; gap:6px; }
.evidence-item svg { width:12px; height:12px; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#C8CDD6; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#A0A8B6; }

/* Calendar view */
.calendar-month { margin-bottom:16px; }
.calendar-month h4 { font-size:13px; font-weight:700; margin-bottom:8px; color:var(--text-secondary); }
.task-list-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius); margin-bottom:6px; background:#fff; transition:var(--transition); }
.task-list-item:hover { border-color:var(--primary); }
.task-list-item.overdue { border-left:3px solid var(--danger); }
.task-list-item.due-soon { border-left:3px solid var(--warning); }
.task-date { font-family:var(--mono); font-size:11px; color:var(--text-muted); min-width:80px; }
.task-info { flex:1; }
.task-info strong { font-size:13px; }
.task-info small { font-size:11px; color:var(--text-secondary); }

/* Report preview */
.report-preview { border:1px solid var(--border); border-radius:var(--radius-lg); padding:30px; background:#fff; max-width:800px; }
.report-preview h1 { font-size:20px; margin-bottom:4px; }
.report-preview h2 { font-size:16px; margin:20px 0 8px; border-bottom:1px solid var(--border); padding-bottom:4px; }
.report-preview h3 { font-size:14px; margin:14px 0 6px; }
.report-preview table { margin:10px 0; }
.report-preview .rpt-meta { font-size:12px; color:var(--text-secondary); margin-bottom:20px; }

/* Utility */
.flex { display:flex; }
.flex-between { display:flex; align-items:center; justify-content:space-between; }
.gap-8 { gap:8px; }
.gap-12 { gap:12px; }
.mb-8 { margin-bottom:8px; }
.mb-16 { margin-bottom:16px; }
.text-sm { font-size:12px; }
.text-xs { font-size:11px; }
.text-muted { color:var(--text-muted); }
.text-right { text-align:right; }
.fw-600 { font-weight:600; }
.truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.clickable { cursor:pointer; }
.clickable:hover { color:var(--primary); }
.hidden { display:none !important; }

/* Page transitions */
.page { display:none; animation:fadeIn 0.2s ease; }
.page.active { display:block; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

/* Print/PDF */
@media print { .sidebar, .topbar { display:none; } .content { padding:0; } }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2><span>DORA</span> ICT TPRM</h2>
      <p>Risk Management Suite</p>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <div class="nav-item active" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </div>
      <div class="nav-item" data-page="providers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ICT Providers
        <span class="nav-badge" id="nav-badge-providers"></span>
      </div>
      <div class="nav-item" data-page="controls">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><path d="M12 2a10 10 0 100 20 10 10 0 000-20z"/></svg>
        Controls & Evidence
      </div>
      <div class="nav-item" data-page="findings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Findings
        <span class="nav-badge" id="nav-badge-findings"></span>
      </div>
      <div class="nav-item" data-page="tasks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Monitoring & Audit
        <span class="nav-badge" id="nav-badge-tasks"></span>
      </div>
      <div class="nav-item" data-page="reports">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Reports

  daysBetween(d1, d2) {
    const a = new Date(d1), b = new Date(d2);

    const d = new Date(iso);

/* ===== SCORING ENGINE ===== */
const Scoring = {
  inherentScore(p) {
    let score = 0;
    (p.dataCategories||[]).forEach(c => { score += (DATA_CAT_SCORES[c]||0); });
    score += ACCESS_SCORES[p.accessLevel] || 0;
    score += CLOUD_SCORES[p.cloudModel] || 0;
    score += p.subOutsourcing ? 2 : 0;
    score += p.criticalFunction ? 3 : 0;
    score += CRIT_SCORES[p.criticality] || 0;
    return score;
  },
  inherentTier(score) {
    const s = Store.settings;
    if (score <= (s.criticalityRules?.lowMax || 6)) return 'Low';
    if (score <= (s.criticalityRules?.medMax || 12)) return 'Medium';
    return 'High';
  },
  maturity(providerId) {
    const ctrls = Store.getControls(providerId);
    let total=0, passed=0;
    for (const dk of Object.keys(ctrls)) {
      for (const ik of Object.keys(ctrls[dk])) {
        total++;
        const st = ctrls[dk][ik].status;
        if (st==='Pass' || st==='N/A') passed++;
      }
    }
    return total > 0 ? Math.round((passed/total)*100) : 0;
  },
  domainMaturity(providerId) {
    const ctrls = Store.getControls(providerId);
    const result = {};
    for (const dk of Object.keys(ctrls)) {
      let total=0, passed=0;
      for (const ik of Object.keys(ctrls[dk])) {
        total++;
        const st = ctrls[dk][ik].status;
        if (st==='Pass' || st==='N/A') passed++;
      }
      result[dk] = total > 0 ? Math.round((passed/total)*100) : 0;
    }
    return result;
  },
  residualTier(p) {
    const iScore = this.inherentScore(p);
    let tier = this.inherentTier(iScore);
    const mat = this.maturity(p.id);
    const openFindings = Store.findings.filter(f => f.providerId===p.id && f.status!=='Closed');
    const hasCritical = openFindings.some(f => f.severity === 'Critical');
    const hasHighCritical = openFindings.some(f => f.severity==='High' || f.severity==='Critical');
    const overdueTasks = Store.tasks.filter(t => t.providerId===p.id && t.status==='Overdue');
    const recentOverdue = overdueTasks.filter(t => {
      const days = Utils.daysBetween(t.nextDue, Utils.today());
      return days <= 90;
    });

    if (hasCritical || mat < 60) {
      tier = 'High';
    } else if (mat >= 85 && !hasHighCritical && recentOverdue.length === 0) {
      if (tier === 'High') tier = 'Medium';
      else if (tier === 'Medium') tier = 'Low';
    }
    return tier;
  },
  nextReviewDate(p) {
    const rTier = this.residualTier(p);
    const cadence = Store.settings.reviewCadence;
    let months = cadence[rTier] || 12;
    if (p.criticalFunction && months > 12) months = 12;
    const base = p.lastAssessment || Utils.today();
    return Utils.addMonths(base, months);
  }
};

    document.getElementById('sidebar-nav').addEventListener('click', e => {

      const page = item.dataset.page;
      this.navigate(page);

    document.getElementById('global-search').addEventListener('input', Utils.debounce(e => {

        this.renderProviders(q);
      }

    this.currentPage = page;

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));

    switch(page) {
      case 'dashboard': this.renderDashboard(); break;
      case 'providers': if (detail) { this.currentProviderId=detail; this.renderProviderDetail(detail); } else this.renderProviders(); break;

  /* ===== DASHBOARD ===== */

    const tasks = Store.tasks;

    const highRisk = ps.filter(p=>Scoring.residualTier(p)==='High').length;

    const attention = ps.map(p => ({

  renderDashboardCharts(ps, openFindings, tasks, overdueTasks) {
    // Destroy old charts
    Object.values(this.charts).forEach(c=>c.destroy());
    this.charts = {};

    const chartOpts = { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'IBM Plex Sans'},padding:12}}} };

    // Criticality
    const critCounts = {Low:0,Medium:0,High:0};
    ps.forEach(p=>critCounts[p.criticality]=(critCounts[p.criticality]||0)+1);
    this.charts.crit = new Chart(document.getElementById('chart-criticality'), {
      type:'doughnut', data:{labels:['Low','Medium','High'],datasets:[{data:[critCounts.Low,critCounts.Medium,critCounts.High],backgroundColor:['#0EA574','#E8A317','#DC3545'],borderWidth:0}]}, options:{...chartOpts,cutout:'65%'}
    });

    // Risk comparison
    const iRisk={Low:0,Medium:0,High:0}, rRisk={Low:0,Medium:0,High:0};
    ps.forEach(p=>{
      const it=Scoring.inherentTier(Scoring.inherentScore(p)); iRisk[it]++;
      const rt=Scoring.residualTier(p); rRisk[rt]++;
    });
    this.charts.risk = new Chart(document.getElementById('chart-risk'), {
      type:'bar', data:{labels:['Low','Medium','High'],datasets:[
        {label:'Inherent',data:[iRisk.Low,iRisk.Medium,iRisk.High],backgroundColor:'rgba(27,110,243,0.7)',borderRadius:4},
        {label:'Residual',data:[rRisk.Low,rRisk.Medium,rRisk.High],backgroundColor:'rgba(220,53,69,0.7)',borderRadius:4}
      ]}, options:{...chartOpts,scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
    });

    // Findings
    const fCounts = {Low:0,Medium:0,High:0,Critical:0};
    openFindings.forEach(f=>fCounts[f.severity]=(fCounts[f.severity]||0)+1);
    this.charts.findings = new Chart(document.getElementById('chart-findings'), {
      type:'bar', data:{labels:['Low','Medium','High','Critical'],datasets:[{data:[fCounts.Low,fCounts.Medium,fCounts.High,fCounts.Critical],backgroundColor:['#0EA574','#E8A317','#DC3545','#8B0000'],borderRadius:4}]}, options:{...chartOpts,plugins:{...chartOpts.plugins,legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
    });

    // Tasks
    const onTime = tasks.filter(t=>t.status==='Completed'|| (t.status==='Pending' && t.nextDue >= Utils.today())).length;
    const overdue = overdueTasks.length;
    const pending = tasks.filter(t=>t.status==='Pending' && t.nextDue >= Utils.today()).length;
    this.charts.tasks = new Chart(document.getElementById('chart-tasks'), {
      type:'doughnut', data:{labels:['On Track','Overdue','Completed'],datasets:[{data:[pending,overdue,tasks.filter(t=>t.status==='Completed').length],backgroundColor:['#1B6EF3','#DC3545','#0EA574'],borderWidth:0}]}, options:{...chartOpts,cutout:'65%'}
    });
  },

    const name = document.getElementById('pf-name').value.trim();

    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { Toast.show('Invalid email format','error'); return; }

    const cats = [...document.querySelectorAll('#pf-dataCats input:checked')].map(i=>i.value);
    const p = {
      id: id || Utils.uid(),
      name,
      legalName: document.getElementById('pf-legalName').value.trim(),
      contractId: document.getElementById('pf-contractId').value.trim(),

  renderProviderControls(container, providerId) {
    const ctrls = Store.getControls(providerId);
    let html = `<div class="flex-between mb-8"><span class="text-sm text-muted">Set control status and attach evidence metadata for each DORA domain.</span></div>`;
    for (const [dk, domain] of Object.entries(DORA_DOMAINS)) {
      const items = domain.items;
      const domCtrl = ctrls[dk] || {};
      const mat = (() => { let t=0,p=0; Object.values(domCtrl).forEach(v=>{t++;if(v.status==='Pass'||v.status==='N/A')p++;}); return t?Math.round(p/t*100):0; })();
      html += `<div class="control-domain">
        <div class="control-domain-header" onclick="this.parentElement.classList.toggle('collapsed')">
          <span>${dk}) ${domain.name}</span>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="progress-bar" style="width:80px"><div class="progress-fill ${mat>=85?'green':mat>=60?'yellow':'red'}" style="width:${mat}%"></div></div>
            <span class="text-xs fw-600">${mat}%</span>
          </div>
        </div>
        ${items.map((item, i) => {
          const ik = `${dk}-${i}`;
          const st = domCtrl[ik]?.status || 'Not Started';
          const ev = domCtrl[ik]?.evidence || [];
          const stClass = st==='Pass'?'pass':st==='Fail'?'fail':st==='In Progress'?'in-progress':st==='N/A'?'na':'';
          return `<div class="control-item">
            <select class="control-status-select ${stClass}" onchange="App.setControlStatus('${providerId}','${dk}','${ik}',this.value);App.renderProviderDetail('${providerId}')">
              <option ${st==='Not Started'?'selected':''}>Not Started</option>
              <option ${st==='In Progress'?'selected':''}>In Progress</option>
              <option ${st==='Pass'?'selected':''}>Pass</option>
              <option ${st==='Fail'?'selected':''}>Fail</option>
              <option ${st==='N/A'?'selected':''}>N/A</option>
            </select>
            <div class="control-item-text">
              <span>${Utils.escHtml(item)}</span>
              <div class="evidence-list">
                ${ev.map(e=>`<div class="evidence-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> ${Utils.escHtml(e.title)} <span class="text-muted">— ${Utils.formatDate(e.date)}</span></div>`).join('')}
              </div>
              <button class="btn btn-xs btn-outline" style="margin-top:4px;" onclick="App.addEvidenceModal('${providerId}','${dk}','${ik}')">+ Evidence</button>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }
    container.innerHTML = html;
  },

    Store.setControlStatus(pid, dk, ik, status);

  saveEvidence(pid, dk, ik) {
    const title = document.getElementById('ev-title').value.trim();

    Store.addEvidence(pid, dk, ik, {
      id: Utils.uid(),
      title,
      description: document.getElementById('ev-desc').value.trim(),
      link: document.getElementById('ev-link').value.trim(),
      date: document.getElementById('ev-date').value,
      owner: document.getElementById('ev-owner').value,
    });
    Modal.close();
    Toast.show('Evidence added');
    this.renderProviderDetail(pid);

  saveTask(id) {
    const name = document.getElementById('tf-name').value.trim();
    if (!name) { Toast.show('Task name is required','error'); return; }
    const freq = document.getElementById('tf-freq').value;
    const start = document.getElementById('tf-start').value;
    let nextDue = document.getElementById('tf-nextDue').value;
    if (!nextDue && start) {
      const days = FREQ_DAYS[freq] || 90;
      nextDue = Utils.addDays(start, days);
    }

    const eclItems = [];
    document.querySelectorAll('#tf-ecl .form-check').forEach(row => {
      const cb = row.querySelector('input[type="checkbox"]');
      const txt = row.querySelector('input.form-control');
      if (txt && txt.value.trim()) eclItems.push({ text: txt.value.trim(), done: cb.checked });
    });

    const t = {
      id: id || Utils.uid(),
      providerId: document.getElementById('tf-provider').value,
      type: document.getElementById('tf-type').value,
      name,
      frequency: freq,
      startDate: start,
      nextDue,
      owner: document.getElementById('tf-owner').value,
      priority: document.getElementById('tf-priority').value,
      status: id ? Store.getTask(id)?.status || 'Pending' : 'Pending',
      notes: document.getElementById('tf-notes').value.trim(),
      evidenceChecklist: eclItems,
      completedDate: id ? Store.getTask(id)?.completedDate : '',
    };
    Store.saveTask(t);
    Modal.close();
    Toast.show(id ? 'Task updated' : 'Task added');
    if (this.currentProviderId) this.renderProviderDetail(this.currentProviderId);
    else this.renderTasks();
    this.updateBadges();
  },

  completeTask(id, returnPid) {
    const t = Store.getTask(id);
    if (!t) return;
    t.status = 'Completed';
    t.completedDate = Utils.today();
    Store.saveTask(t);

    // Auto-schedule next instance
    const days = FREQ_DAYS[t.frequency] || (t.frequency === 'Custom' ? 90 : 365);
    const next = {
      ...t,
      id: Utils.uid(),
      status: 'Pending',
      completedDate: '',
      nextDue: Utils.addDays(Utils.today(), days),
      startDate: Utils.today(),
      evidenceChecklist: t.evidenceChecklist.map(e=>({...e, done:false})),
    };
    Store.saveTask(next);
    Toast.show('Task completed. Next instance scheduled.');
    if (returnPid || this.currentProviderId) this.renderProviderDetail(returnPid || this.currentProviderId);
    else this.renderTasks();
    this.updateBadges();
  },

  async exportReportPDF() {
    this.generateReport();
    const el = document.getElementById('report-content');
    if (!el) { Toast.show('Generate a report preview first','error'); return; }
    Toast.show('Generating PDF...','info');
    try {
      const canvas = await html2canvas(el, { scale: 2, useCORS: true, logging: false });
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p','mm','a4');
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const margin = 10;
      const imgW = pageW - 2*margin;
      const imgH = (canvas.height * imgW) / canvas.width;
      let y = margin;
      const pageContentH = pageH - 2*margin;

      if (imgH <= pageContentH) {
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, margin, imgW, imgH);
      } else {
        // Multi-page
        let srcY = 0;
        const sliceH = Math.floor(canvas.width * pageContentH / imgW);
        while (srcY < canvas.height) {
          const h = Math.min(sliceH, canvas.height - srcY);
          const sliceCanvas = document.createElement('canvas');
          sliceCanvas.width = canvas.width;
          sliceCanvas.height = h;
          sliceCanvas.getContext('2d').drawImage(canvas, 0, srcY, canvas.width, h, 0, 0, canvas.width, h);
          const renderedH = (h * imgW) / canvas.width;
          if (srcY > 0) pdf.addPage();
          pdf.addImage(sliceCanvas.toDataURL('image/png'), 'PNG', margin, margin, imgW, renderedH);
          srcY += h;
        }
      }
      pdf.save(`dora-tprm-report-${Utils.today()}.pdf`);
      Toast.show('PDF exported successfully');
    } catch(e) {
      console.error(e);
      Toast.show('PDF export failed: ' + e.message, 'error');
    }
  },

        <h3 class="card-title mb-8">Risk Tier Thresholds</h3>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Low max score (≤)</label><input class="form-control" id="set-low-max" type="number" value="${s.criticalityRules.lowMax}"></div>
          <div class="form-group"><label class="form-label">Medium max score (≤)</label><input class="form-control" id="set-med-max" type="number" value="${s.criticalityRules.medMax}"></div>
        </div>
      </div>

      <div class="card">
        <h3 class="card-title mb-8">Internal Owners List</h3>
        <div class="form-group"><textarea class="form-control" id="set-owners" rows="4">${s.ownersList.join('\n')}</textarea></div>
        <p class="text-xs text-muted">One owner role per line.</p>
      </div>

      <div class="card">
        <h3 class="card-title mb-8">Data Management</h3>
        <div class="btn-group" style="flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="App.saveSettings()">Save Settings</button>
          <button class="btn btn-outline" onclick="App.exportJSON()">Export JSON Backup</button>
          <label class="btn btn-outline" style="cursor:pointer;"><input type="file" accept=".json" style="display:none" onchange="App.importJSONFile(event)"> Import JSON Backup</label>
          <button class="btn btn-danger" onclick="App.confirmReset()">Reset All Data</button>
        </div>
      </div>
    `;
  },

  saveSettings() {
    const s = Store.settings;
    s.reviewCadence.High = parseInt(document.getElementById('set-cad-high').value) || 6;
    s.reviewCadence.Medium = parseInt(document.getElementById('set-cad-med').value) || 12;
    s.reviewCadence.Low = parseInt(document.getElementById('set-cad-low').value) || 24;
    s.criticalityRules.lowMax = parseInt(document.getElementById('set-low-max').value) || 6;
    s.criticalityRules.medMax = parseInt(document.getElementById('set-med-max').value) || 12;
    s.ownersList = document.getElementById('set-owners').value.split('\n').map(x=>x.trim()).filter(Boolean);
    Store.save();
    Toast.show('Settings saved');
  },

  importJSONFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      if (Store.importJSON(e.target.result)) {
        Toast.show('Data imported successfully');
        this.navigate(this.currentPage);
      }
    };
    reader.readAsText(file);
  },

  confirmReset() {
    Modal.open('Reset All Data',
      '<p>This will delete all providers, findings, tasks, and settings and reseed with sample data. This cannot be undone.</p>',
      '<button class="btn btn-outline" onclick="Modal.close()">Cancel</button><button class="btn btn-danger" onclick="Store.reset();Modal.close();Toast.show(\'Data reset\');App.navigate(\'dashboard\');">Reset</button>'
    );
  },
};

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
